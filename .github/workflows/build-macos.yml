name: macOS-DMG (Release)

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Version aus Tag bestimmen
        id: ver
        run: |
          tag="${{ github.ref_name }}"
          if [[ "$tag" =~ ^v?[0-9] ]]; then v="${tag#v}"; else v="0.0.0"; fi
          printf "%s" "$v" > VERSION
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Version: $v"

      - name: Abhängigkeiten installieren
        run: python -m pip install -r requirements.txt pyinstaller

      - name: Embedding-Modell bündeln
        run: python -c "import sys; sys.path.insert(0,'engine'); from echo_engine.semantic import MODEL_NAME; from fastembed import TextEmbedding; TextEmbedding(MODEL_NAME, cache_dir='build/models')"

      - name: App bauen
        run: python -m PyInstaller --noconfirm --distpath dist --workpath build/pyi build/echoarchive.spec

      - name: App-ZIP (Auto-Update) erzeugen
        run: |
          VER="${{ steps.ver.outputs.version }}"
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/AICP Research.app" "dist/AICP-Research-macOS-$VER.zip"

      - name: Schönes DMG mit Pfeil erzeugen (create-dmg)
        run: |
          VER="${{ steps.ver.outputs.version }}"
          npm install --global create-dmg
          # Erzeugt automatisch ein Fenster mit App-Icon, Pfeil und
          # Programme-Ordner. Bei Fehler: einfaches DMG als Rückfall.
          if create-dmg --no-code-sign --dmg-title "AICP Research" \
               "dist/AICP Research.app" dist/; then
            SRC=$(ls dist/AICP\ Research\ *.dmg | head -1)
            mv "$SRC" "dist/AICP-Research-$VER.dmg"
          else
            echo "create-dmg fehlgeschlagen – nutze einfaches DMG"
            mkdir -p dmgroot
            cp -R "dist/AICP Research.app" dmgroot/
            ln -s /Applications dmgroot/Applications
            hdiutil create -volname "AICP Research" -srcfolder dmgroot \
              -ov -format UDZO "dist/AICP-Research-$VER.dmg"
          fi

      - name: Artefakte hochladen
        uses: actions/upload-artifact@v4
        with:
          name: AICP-Research-macOS
          path: |
            dist/AICP-Research-*.dmg
            dist/AICP-Research-macOS-*.zip

      - name: Release veröffentlichen (nur bei Tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/AICP-Research-*.dmg
            dist/AICP-Research-macOS-*.zip
          fail_on_unmatched_files: true
