name: macOS-DMG (Release)

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Version aus Tag bestimmen
        id: ver
        run: |
          tag="${{ github.ref_name }}"
          if [[ "$tag" =~ ^v?[0-9] ]]; then v="${tag#v}"; else v="0.0.0"; fi
          printf "%s" "$v" > VERSION
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Version: $v"

      - name: Abhängigkeiten installieren
        run: python -m pip install -r requirements.txt pyinstaller

      - name: Embedding-Modell bündeln
        run: python -c "import sys; sys.path.insert(0,'engine'); from echo_engine.semantic import MODEL_NAME; from fastembed import TextEmbedding; TextEmbedding(MODEL_NAME, cache_dir='build/models')"

      - name: App bauen
        run: python -m PyInstaller --noconfirm --distpath dist --workpath build/pyi build/echoarchive.spec

      - name: DMG erzeugen
        run: |
          hdiutil create -volname "AICP Research" \
            -srcfolder "dist/AICP Research.app" \
            -ov -format UDZO "dist/AICP-Research-${{ steps.ver.outputs.version }}.dmg"

      - name: DMG als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: AICP-Research-DMG
          path: dist/AICP-Research-*.dmg

      - name: Release veröffentlichen (nur bei Tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AICP-Research-*.dmg
          fail_on_unmatched_files: true
