<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
<meta charset="utf-8">
<title>AICP Research</title>
<style>
  :root {
    --bg: #ffffff;
    --surface: #f7f8f8;
    --panel: #ffffff;
    --ink: #17201c;
    --muted: #737d78;
    --faint: #9aa39e;
    --line: #e8eae8;
    --line-strong: #d9dcd9;
    --accent: #12795a;
    --accent-weak: #eef5f1;
    --accent-ink: #0c5c44;
    /* Kräftige, gut lesbare Chip-/Badge-Farben (statt blasser Pastelltöne) */
    --chip-bg: #d4ebe0;
    --chip-ink: #0f6b4f;
    --hl: #f0a800;          /* sattes Amber für Suchtreffer (kräftiger, gut lesbar) */
    --hl-ink: #2e2200;      /* dunkler Text auf der Markierung */
    --err: #b23a2e;
    --err-bg: #f7d7d1;
    --err-ink: #8f2c20;
    --warn: #9a6a12;
    --warn-bg: #f5e2b8;
    --warn-ink: #7a5200;
    --radius: 10px;
    --shadow: 0 1px 2px rgba(20,30,25,.04), 0 8px 24px rgba(20,30,25,.06);
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
            "Helvetica Neue", Arial, "Noto Sans", sans-serif;
    --arab: "Noto Naskh Arabic", "Amiri", var(--sans);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: var(--sans); font-size: 15px; line-height: 1.5;
    -webkit-font-smoothing: antialiased; overflow: hidden;
  }
  :lang(ar), [dir="rtl"] { font-family: var(--arab); }
  button { font-family: inherit; }
  ::selection { background: var(--accent-weak); }

  svg.ic { width: 18px; height: 18px; stroke: currentColor; fill: none;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    flex: none; }

  #app { display: grid; grid-template-columns: 244px 1fr; height: 100vh; }

  /* ---------- Sidebar ---------- */
  nav {
    background: var(--surface); border-inline-end: 1px solid var(--line);
    display: flex; flex-direction: column; padding: 16px 12px;
    min-height: 0; overflow-y: auto;
  }
  .brand {
    display: flex; align-items: center; gap: 9px; padding: 6px 10px 18px;
    font-weight: 650; font-size: 16px; letter-spacing: -.01em;
    color: var(--ink);
  }
  .brand .dot { width: 22px; height: 22px; border-radius: 7px;
    background: var(--accent); display: grid; place-items: center; }
  .brand .dot svg { stroke: #fff; width: 14px; height: 14px; }
  .navItem {
    display: flex; align-items: center; gap: 11px; width: 100%;
    padding: 9px 11px; border: 0; background: none; cursor: pointer;
    color: #2a332e; border-radius: 8px; font-size: 14.5px; font-weight: 500;
    text-align: start; margin-bottom: 2px; transition: background .12s, color .12s;
  }
  .navItem svg { stroke: var(--muted); }
  .navItem:hover { background: rgba(18,121,90,.06); color: var(--ink); }
  .navItem:hover svg { stroke: var(--ink); }
  .navItem.active { background: var(--accent-weak); color: var(--accent-ink);
    font-weight: 600; }
  .navItem.active svg { stroke: var(--accent); }
  .navSpacer { flex: 1; }
  .navSection { border-top: 1px solid var(--line); margin-top: 8px;
    padding-top: 8px; }
  .navItem.subtle { color: #3a423d; font-size: 13.5px; padding: 8px 11px;
    font-weight: 500; }
  .navItem.updateItem { color: var(--accent-ink); background: var(--accent-weak);
    font-weight: 600; font-size: 13.5px; }
  .navItem.updateItem svg { stroke: var(--accent); }
  .navItem.updateItem:hover { background: #dfeee7; }
  #navStatus { font-size: 12px; color: var(--faint); padding: 6px 11px 2px;
    line-height: 1.5; display: flex; align-items: center; gap: 7px; }
  #navStatus .pulse { width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent); flex: none; }
  #navStatus.off .pulse { background: var(--faint); }
  /* ---------- Sammlungen (Seitenleiste + Index-Seiten) ---------- */
  .navCollections { border-top: 1px solid var(--line); margin-top: 8px;
    padding-top: 10px; }
  .navSecLabel { font-size: 11px; font-weight: 700; letter-spacing: .06em;
    text-transform: uppercase; color: var(--faint); padding: 0 11px 6px; }
  /* Index-Seite: Kopf mit Suchfeld + „verwalten"-Button */
  .indexHead { max-width: 900px; margin: 0 auto 18px; display: flex;
    align-items: center; gap: 12px; flex-wrap: wrap; }
  .indexHead h1.title { margin: 0; flex: none; }
  .indexSearch { flex: 1; min-width: 200px; position: relative; }
  .indexSearch input { width: 100%; padding: 10px 14px 10px 40px;
    border: 1px solid var(--line-strong); border-radius: 10px; font-size: 14px;
    font-family: inherit; background: var(--panel); color: var(--ink); }
  .indexSearch input:focus { outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-weak); }
  .indexSearch .si { position: absolute; inset-inline-start: 12px; top: 50%;
    transform: translateY(-50%); width: 17px; height: 17px; color: var(--faint);
    pointer-events: none; }
  /* Liste der Autoren/Kategorien */
  .indexList { max-width: 900px; margin: 0 auto; border: 1px solid var(--line);
    border-radius: var(--radius); overflow: hidden; background: var(--panel); }
  .indexItem { display: flex; align-items: center; gap: 12px; width: 100%;
    padding: 13px 18px; border: 0; border-bottom: 1px solid var(--line);
    background: none; cursor: pointer; text-align: start;
    transition: background .12s; }
  .indexItem:last-child { border-bottom: 0; }
  .indexItem:hover { background: var(--surface); }
  .indexItem .in { font-weight: 600; font-size: 15px; color: var(--ink);
    font-family: var(--arab); overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; }
  .indexItem .ic-count { margin-inline-start: auto; flex: none; font-size: 12.5px;
    font-weight: 600; color: var(--chip-ink); background: var(--chip-bg);
    padding: 3px 10px; border-radius: 999px; }
  .indexItem .chev { flex: none; width: 17px; height: 17px; color: var(--faint); }
  /* Buchlisten-Kopf (Sammlung eines Autors/einer Kategorie) */
  .collKind { font-size: 12px; font-weight: 700; letter-spacing: .05em;
    text-transform: uppercase; color: var(--accent-ink); margin-bottom: 2px; }
  .backBtn { display: inline-flex; align-items: center; gap: 6px; border: 0;
    background: none; cursor: pointer; color: var(--muted); font-size: 13px;
    font-family: inherit; padding: 4px 0; margin-bottom: 6px; }
  .backBtn:hover { color: var(--accent-ink); }
  .backBtn svg { width: 16px; height: 16px; }

  /* ---------- Content ---------- */
  section.view { display: none; height: 100vh; overflow-y: auto;
    padding: 34px 40px 60px; }
  section.view.active { display: block; }
  .viewHead { max-width: 900px; margin: 0 auto 20px; }
  .viewInner { max-width: 900px; margin: 0 auto; }
  h1.title { font-size: 21px; font-weight: 650; letter-spacing: -.02em;
    margin: 0 0 3px; }
  .subtitle { color: var(--muted); font-size: 14px; }

  /* ---------- Search ---------- */
  .segmented { display: inline-flex; background: var(--surface);
    border: 1px solid var(--line); border-radius: 9px; padding: 3px;
    gap: 2px; margin-bottom: 16px; }
  .segmented button { border: 0; background: none; cursor: pointer;
    padding: 6px 15px; border-radius: 7px; font-size: 13.5px;
    color: var(--muted); font-weight: 500; }
  .segmented button.active { background: var(--panel); color: var(--ink);
    box-shadow: 0 1px 2px rgba(0,0,0,.06); font-weight: 600; }

  .searchBar { display: flex; gap: 10px; align-items: stretch; }
  .inputWrap { flex: 1; display: flex; align-items: center; gap: 9px;
    background: var(--panel); border: 1px solid var(--line-strong);
    border-radius: var(--radius); padding: 0 14px; transition: border-color .12s, box-shadow .12s; }
  .inputWrap:focus-within { border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-weak); }
  .inputWrap svg { stroke: var(--faint); }
  .inputWrap input { flex: 1; border: 0; outline: none; background: none;
    font-family: inherit; font-size: 15.5px; padding: 12px 0; color: var(--ink); }
  .btn { border: 1px solid var(--line-strong); background: var(--panel);
    color: var(--ink); border-radius: var(--radius); padding: 0 16px;
    font-size: 14px; font-weight: 500; cursor: pointer; display: inline-flex;
    align-items: center; gap: 7px; transition: background .12s, border-color .12s; }
  .btn:hover { background: var(--surface); }
  .btn.primary { background: var(--accent); border-color: var(--accent);
    color: #fff; font-weight: 600; }
  .btn.primary:hover { background: var(--accent-ink); }
  .btn.sm { padding: 6px 12px; font-size: 13px; border-radius: 8px; }
  .btn.ghost { border-color: transparent; background: none; color: var(--muted); }
  .btn.ghost:hover { background: var(--surface); color: var(--ink); }
  .btn.danger { border-color: #e6c3bd; color: var(--err); }
  .btn.danger:hover { background: #fbeae7; border-color: #dcaea6; }

  .filters { display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
    margin-top: 12px; font-size: 13.5px; color: var(--muted); }
  .filters select { padding: 6px 10px; border-radius: 8px;
    border: 1px solid var(--line-strong); font-family: inherit;
    background: var(--panel); color: var(--ink); max-width: 220px; }
  .authorFilter { position: relative; display: inline-flex; flex-wrap: wrap;
    align-items: center; gap: 6px; min-width: 220px; max-width: 380px;
    padding: 4px 6px; border: 1px solid var(--line-strong); border-radius: 8px;
    background: var(--panel); cursor: text; }
  .authorFilter:focus-within { border-color: var(--accent); }
  /* Hochwertiges Auswahl-Dropdown (statt nativem <datalist>) */
  .comboPanel { position: absolute; top: calc(100% + 5px); inset-inline-start: 0;
    min-width: 220px; max-width: 340px; max-height: 260px; overflow-y: auto;
    background: var(--panel); border: 1px solid var(--line-strong);
    border-radius: 11px; box-shadow: var(--shadow); z-index: 45; padding: 5px;
    display: none; }
  .comboPanel.show { display: block; }
  .comboOpt { padding: 8px 11px; border-radius: 8px; cursor: pointer;
    font-size: 13.5px; font-family: var(--arab); color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .comboOpt:hover, .comboOpt.active { background: var(--accent-weak);
    color: var(--accent-ink); }
  .comboEmpty { padding: 9px 11px; font-size: 13px; color: var(--faint); }
  .authorFilter input { border: 0; outline: none; background: none; flex: 1;
    min-width: 90px; font-family: inherit; font-size: 13.5px; color: var(--ink);
    padding: 3px 2px; }
  .authorFilter .chip { font-size: 12px; padding: 3px 5px 3px 10px; }
  .switch { display: inline-flex; align-items: center; gap: 7px; cursor: pointer; }
  .switch input { accent-color: var(--accent); }
  .chip { display: inline-flex; align-items: center; gap: 7px;
    background: var(--chip-bg); color: var(--chip-ink); font-weight: 600;
    padding: 4px 6px 4px 12px; border-radius: 999px; font-size: 12.5px; }
  .chip button { border: 0; background: none; cursor: pointer; color: inherit;
    display: grid; place-items: center; padding: 2px; border-radius: 50%; }
  .chip button:hover { background: rgba(12,92,68,.12); }
  .overlay { position: fixed; inset: 0; background: rgba(20,30,25,.28);
    display: none; align-items: center; justify-content: center; z-index: 60; }
  .overlay.show { display: flex; }
  .modal { width: min(460px, 92vw); background: var(--panel);
    border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow);
    padding: 20px; }
  .modalHead { display: flex; align-items: center; justify-content: space-between;
    font-size: 15px; font-weight: 650; margin-bottom: 16px; }
  .mfLabel { display: block; font-size: 12.5px; color: var(--muted);
    font-weight: 600; margin: 14px 0 6px; }
  .mfInput { width: 100%; padding: 9px 12px; border: 1px solid var(--line-strong);
    border-radius: 9px; font-size: 14px; font-family: inherit; background: var(--bg);
    color: var(--ink); }
  .mfInput:focus { outline: none; border-color: var(--accent); }
  .chipField { position: relative; display: flex; flex-wrap: wrap; gap: 7px;
    align-items: center; padding: 7px; border: 1px solid var(--line-strong);
    border-radius: 9px; min-height: 42px; background: var(--bg); cursor: text; }
  .chipField:focus-within { border-color: var(--accent); }
  .chipField input { border: 0; outline: none; background: none; flex: 1;
    min-width: 120px; font-size: 14px; font-family: inherit; color: var(--ink);
    padding: 4px 2px; }
  .modalFoot { display: flex; justify-content: flex-end; gap: 8px; margin-top: 22px; }
  /* Verwalten-Popup (Kategorien / Autoren) – hochwertige Variante */
  .modal.modalLg { width: min(560px, 94vw); padding: 24px 24px 20px; }
  .modalLg .modalHead { align-items: flex-start; margin-bottom: 18px; }
  .mhTitle { display: flex; align-items: center; gap: 13px; }
  .mhIcon { width: 40px; height: 40px; border-radius: 11px; flex: none;
    background: var(--accent-weak); display: grid; place-items: center; }
  .mhIcon svg { width: 21px; height: 21px; stroke: var(--accent); }
  .mhTitle > span:last-child { display: flex; flex-direction: column; }
  #manageHead { font-size: 17px; font-weight: 650; letter-spacing: -.01em; }
  .mhSub { font-size: 12.5px; color: var(--muted); font-weight: 400;
    margin-top: 2px; }
  .manageNewRow { display: flex; gap: 8px; align-items: stretch; margin: 4px 0 18px;
    padding: 12px; background: var(--surface); border-radius: 11px; }
  .manageNewRow .mfInput { flex: 1; background: var(--panel); }
  .manageNewRow .btn { flex: none; padding: 0 20px; }
  .manageList { max-height: 50vh; overflow-y: auto; display: flex;
    flex-direction: column; gap: 8px; padding-right: 2px; }
  .catRow { display: flex; align-items: center; gap: 12px; padding: 11px 14px;
    border: 1px solid var(--line); border-radius: 11px; background: var(--panel);
    transition: border-color .12s, box-shadow .12s; }
  .catRow:hover { border-color: var(--line-strong); box-shadow: var(--shadow); }
  .catRow .cname { font-weight: 600; font-size: 14.5px; font-family: var(--arab);
    color: var(--ink); overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; flex: 1; min-width: 0; }
  .catRow .cname input { width: 100%; }
  .catRow .ccount { font-size: 12px; font-weight: 600; color: var(--chip-ink);
    background: var(--chip-bg); padding: 2px 9px; border-radius: 999px; flex: none; }
  .catRow .cacts { display: flex; gap: 2px; flex: none; }
  .manageList .empty { color: var(--faint); text-align: center; padding: 30px 10px;
    font-size: 13.5px; }
  /* "Was ist neu"-Fenster */
  .newsBody { max-height: 52vh; overflow-y: auto; font-size: 14px;
    line-height: 1.75; color: #2a332e; }
  .newsBody p { margin: 0 0 9px; }
  .newsBody ul { margin: 0 0 9px; padding-inline-start: 20px; }
  .newsBody li { margin-bottom: 5px; }
  .verLabel { cursor: pointer; }
  .verLabel:hover { color: var(--accent-ink); }
  .hint { font-size: 12.5px; color: var(--faint); margin-top: 12px; }
  .hint code { background: var(--surface); padding: 1px 6px; border-radius: 5px;
    font-size: 12px; color: var(--muted); }

  /* term groups */
  .termGroup { background: var(--panel); border: 1px solid var(--line-strong);
    border-radius: var(--radius); padding: 9px 11px; display: flex;
    flex-wrap: wrap; gap: 7px; align-items: center; }
  .termGroup.focused { border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-weak); }
  .tchip { display: inline-flex; align-items: center; gap: 6px;
    background: var(--chip-bg); color: var(--chip-ink); font-weight: 600;
    font-size: 13.5px; padding: 4px 6px 4px 11px; border-radius: 8px; }
  .tchip button { border: 0; background: none; cursor: pointer; color: inherit;
    display: grid; place-items: center; padding: 0; }
  .tchip.neg { background: var(--err-bg); color: var(--err-ink); }
  .termGroup input { flex: 1; min-width: 150px; border: 0; outline: none;
    font-family: inherit; font-size: 14.5px; background: none; padding: 5px 2px; }
  .orSep { text-align: center; color: var(--faint); font-weight: 600;
    font-size: 12px; letter-spacing: .04em; margin: 9px 0; text-transform: uppercase; }
  .termActions { display: flex; gap: 9px; margin-top: 13px; align-items: center;
    flex-wrap: wrap; }
  #mExcludeArea, #rExcludeArea { margin-top: 13px; }
  /* Großer "Suchen"-Button als letzter Schritt, unter allen Feldern/Filtern */
  .searchGo { width: 100%; justify-content: center; margin-top: 20px;
    padding: 13px 24px; font-size: 15.5px; font-weight: 600; border-radius: 11px; }
  #toTop { position: fixed; bottom: 24px; inset-inline-end: 24px; z-index: 50;
    width: 42px; height: 42px; border-radius: 50%; border: 1px solid var(--line);
    background: var(--panel); color: var(--accent-ink); cursor: pointer;
    box-shadow: var(--shadow); display: grid; place-items: center;
    opacity: 0; transform: translateY(10px); pointer-events: none;
    transition: opacity .18s, transform .18s; }
  #toTop.show { opacity: 1; transform: none; pointer-events: auto; }
  #toTop:hover { background: var(--accent-weak); }
  #toTop svg { width: 20px; height: 20px; stroke: var(--accent); }
  /* Ausschluss-Felder rot markieren – „diese Wörter werden ausgeschlossen" */
  #mExcludeArea .termGroup, #rExcludeArea .termGroup {
    border-color: #e7b3ab; background: #fdf3f1; }
  #mExcludeArea .termGroup.focused, #rExcludeArea .termGroup.focused {
    border-color: var(--err); box-shadow: 0 0 0 3px #f6dcd7; }
  #mExcludeArea .orSep, #rExcludeArea .orSep { color: var(--err); }

  /* results */
  #results, #docResults { margin-top: 22px; display: flex;
    flex-direction: column; gap: 10px; }
  .resultCount { font-size: 13px; color: var(--muted); margin-top: 18px; }
  .hit { background: var(--panel); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 15px 17px; cursor: pointer;
    transition: border-color .12s, box-shadow .12s; }
  .hit:hover { border-color: var(--line-strong); box-shadow: var(--shadow); }
  .hit .top { display: flex; align-items: center; gap: 10px; margin-bottom: 7px;
    flex-wrap: wrap; }
  .hit .htitle { font-weight: 600; font-size: 14.5px; }
  .hit .hauthor { color: var(--muted); font-size: 13px; }
  .hit .meta { margin-inline-start: auto; display: flex; align-items: center;
    gap: 8px; }
  .pageTag { background: var(--surface); color: var(--ink); font-weight: 600;
    font-size: 12.5px; padding: 3px 10px; border-radius: 7px; white-space: nowrap;
    border: 1px solid var(--line); }
  .rel { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 6px;
    white-space: nowrap; cursor: help; }
  .rel.exact { background: var(--chip-bg); color: var(--chip-ink); }
  .rel.approx { background: var(--warn-bg); color: var(--warn-ink); }
  .hit .text { line-height: 1.9; font-size: 14.5px; color: #2a332e;
    font-family: var(--arab); }
  mark { background: var(--hl); color: var(--hl-ink); font-weight: 600;
    padding: 0 2px; border-radius: 3px; }
  .empty { text-align: center; color: var(--faint); padding: 70px 20px;
    font-size: 14px; }
  .empty svg { stroke: var(--line-strong); width: 34px; height: 34px;
    margin-bottom: 12px; }

  /* ---------- Documents ---------- */
  #docsToolbar { max-width: 900px; margin: 0 auto 14px; display: none;
    align-items: center; gap: 16px; }
  .docList { max-width: 900px; margin: 0 auto; border: 1px solid var(--line);
    border-radius: var(--radius); overflow: hidden; background: var(--panel); }
  .docRow { display: flex; align-items: center; gap: 14px; padding: 12px 16px;
    border-bottom: 1px solid var(--line); cursor: pointer; }
  .docRow:last-child { border-bottom: 0; }
  .docRow:hover { background: var(--surface); }
  .docRow input[type=checkbox] { accent-color: var(--accent); }
  .docMain { flex: 1; min-width: 0; }
  .docMain .dt { font-weight: 600; font-size: 14.5px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; }
  .docMain .dm { font-size: 12.5px; color: var(--muted); display: flex; gap: 10px;
    margin-top: 2px; }
  .docActions { display: flex; gap: 2px; flex: none; }
  .iconBtn { width: 32px; height: 32px; border: 0; background: none;
    border-radius: 8px; cursor: pointer; color: var(--muted);
    display: grid; place-items: center; transition: background .12s, color .12s; }
  .iconBtn:hover { background: var(--accent-weak); color: var(--accent-ink); }
  .iconBtn.danger:hover { background: #fbeae7; color: var(--err); }

  /* ---------- Upload ---------- */
  #dropzone { max-width: 900px; margin: 0 auto; border: 1.5px dashed var(--line-strong);
    border-radius: 14px; background: var(--surface); padding: 54px 30px;
    text-align: center; transition: border-color .15s, background .15s; }
  #dropzone.drag { border-color: var(--accent); background: var(--accent-weak); }
  #dropzone .dzIcon { width: 52px; height: 52px; border-radius: 14px;
    background: var(--panel); border: 1px solid var(--line);
    display: inline-grid; place-items: center; margin-bottom: 16px; }
  #dropzone .dzIcon svg { width: 24px; height: 24px; stroke: var(--accent); }
  #dropzone h3 { margin: 0 0 6px; font-size: 17px; font-weight: 600; }
  #dropzone p { margin: 0 0 18px; color: var(--muted); font-size: 13.5px; }
  #uploadJobs { max-width: 900px; margin: 20px auto 0; display: flex;
    flex-direction: column; gap: 8px; }
  .ujob { background: var(--panel); border: 1px solid var(--line);
    border-radius: 9px; padding: 11px 15px; display: flex; gap: 12px;
    align-items: center; font-size: 13.5px; }
  .ujob svg { stroke: var(--faint); }

function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function splitAuthors(a){if(!a)return[];return String(a).split(/\s*[؛;]\s*/).map(s=>s.trim()).filter(Boolean);}
function authorText(a){const p=splitAuthors(a);return p.length?p.join(" · "):"—";}
function highlight(sn,ws){let o=esc(sn);for(const w of(ws||[])){if(!w)continue;o=o.split(esc(w)).join("<mark>"+esc(w)+"</mark>");}return o;}
function showError(m){const e=$("#errbar");e.textContent=m;e.style.display="block";clearTimeout(e._t);e._t=setTimeout(()=>e.style.display="none",7000);}
function showToast(m){const e=$("#toast");e.textContent=m;e.style.display="block";clearTimeout(e._t);e._t=setTimeout(()=>e.style.display="none",5000);}
function relTag(rel){
  if(rel==="ungefähr") return `<span class="rel approx" title="${esc(t('relApproxHint'))}">${esc(t('relApprox'))}</span>`;
  return `<span class="rel exact" title="${esc(t('relExactHint'))}">${esc(t('relExact'))}</span>`;
}
function pageStr(h){const p=t("pagePrefix");return h.page_from===h.page_to?`${p} ${h.page_from}`:`${p} ${h.page_from}–${h.page_to}`;}

/* ---------- Auswahl-Dropdown (Combobox, ersetzt <datalist>) ---------- */
// input: das Textfeld; getOptions(): aktuelle Kandidatenliste (Strings);
// onPick(v): Auswahl/Bestätigung; opts.onBackspace / opts.clearOnBlur.
function attachCombo(input, getOptions, onPick, opts={}){
  const host=input.closest(".authorFilter,.chipField")||input.parentElement;
  const panel=document.createElement("div");panel.className="comboPanel";
  host.appendChild(panel);
  let items=[], active=-1;
  function render(){
    const q=(input.value||"").trim().toLowerCase();
    items=(getOptions()||[]).filter(o=>!q||String(o).toLowerCase().includes(q));
    active=-1;
    if(!items.length){ panel.classList.remove("show"); panel.innerHTML=""; return; }
    panel.innerHTML=items.map((o,i)=>
      `<div class="comboOpt" data-i="${i}" dir="auto">${esc(o)}</div>`).join("");
    panel.classList.add("show");
  }
  function close(){ panel.classList.remove("show"); active=-1; }
  function hl(){ [...panel.children].forEach((c,i)=>c.classList.toggle("active",i===active));
    if(active>=0&&panel.children[active])panel.children[active].scrollIntoView({block:"nearest"}); }
  input.addEventListener("input",render);
  input.addEventListener("focus",render);
  input.addEventListener("keydown",e=>{
    const open=panel.classList.contains("show");
    if(e.key==="ArrowDown"){ e.preventDefault(); if(!open)render();
      active=Math.min(active+1,items.length-1); hl(); }
    else if(e.key==="ArrowUp"){ e.preventDefault(); if(open){active=Math.max(active-1,0);hl();} }
    else if(e.key==="Enter"){ e.preventDefault();
      if(open&&active>=0) onPick(items[active]);
      else if((input.value||"").trim()) onPick(input.value.trim());
      close(); }
    else if(e.key==="Escape"){ if(open){e.preventDefault();close();} }
    else if(e.key==="Backspace"&&!input.value&&opts.onBackspace){ e.preventDefault();opts.onBackspace(); }
  });
  panel.addEventListener("mousedown",e=>{
    const el=e.target.closest(".comboOpt"); if(!el)return;
    e.preventDefault(); onPick(items[+el.dataset.i]); close();
  });
  input.addEventListener("blur",()=>setTimeout(()=>{ close();
    if(opts.clearOnBlur)input.value=""; },130));
  return { render, close };
}

/* ---------- Autorenfilter (Mehrfachauswahl) ---------- */
let authorFilterSel=[];
let authorOptions=[];    // Kandidaten für das Autoren-Dropdown
function fillAuthorSel(authors){
  const names=(authors||[]).map(a=>typeof a==="string"?a:a.name);
  authorOptions=[...new Set(names)].filter(Boolean)
    .sort((a,b)=>a.localeCompare(b,"ar"));
}

async function refreshAuthorSources(){
  try{ const auth=await api().list_authors(); fillAuthorSel(auth); }catch(e){}
}
function removeAuthorFilter(name){
  authorFilterSel=authorFilterSel.filter(x=>x!==name);
  renderAuthorFilter();runSearch();
}
function renderAuthorFilter(){
  const box=$("#authorFilter"),inp=$("#authorSel");if(!box||!inp)return;
  box.querySelectorAll(".chip").forEach(c=>c.remove());
  authorFilterSel.forEach(a=>{
    const c=document.createElement("span");c.className="chip";

    c.querySelector("button").addEventListener("click",e=>{
      e.stopPropagation();e.preventDefault();removeAuthorFilter(a);});

function addAuthorFilter(name){

  if(!authorFilterSel.includes(name)){authorFilterSel.push(name);}
  $("#authorSel").value="";
  renderAuthorFilter();runSearch();
}

/* ---------- Buchfilter (Mehrfachauswahl) ---------- */
let bookFilterSel=[];    // [{id,title}]
let allDocs=[];          // Cache aller Dokumente (Titel -> id auflösen)
function fillBookSel(docs){
  allDocs=(docs||allDocs||[]).slice()
    .sort((a,b)=>(a.title||"").localeCompare(b.title||"","ar"));
}
function removeBookFilter(id){
  bookFilterSel=bookFilterSel.filter(b=>b.id!==id);
  renderBookFilter();fillBookSel();runSearch();
}
function renderBookFilter(){
  const box=$("#bookFilter"),inp=$("#bookSel");if(!box||!inp)return;
  box.querySelectorAll(".chip").forEach(c=>c.remove());
  bookFilterSel.forEach(b=>{
    const c=document.createElement("span");c.className="chip";
    c.innerHTML=`<span>${esc(b.title)}</span><button type="button">${svg("x")}</button>`;
    c.querySelector("button").addEventListener("click",e=>{
      e.stopPropagation();e.preventDefault();removeBookFilter(b.id);});
    box.insertBefore(c,inp);
  });
}
function addBookFilter(title){
  title=(title||"").trim();
  if(!title)return;
  const chosen=new Set(bookFilterSel.map(b=>b.id));
  const doc=(allDocs||[]).find(d=>d.title===title&&!chosen.has(d.id));
  if(doc)bookFilterSel.push({id:doc.id,title:doc.title});
  $("#bookSel").value="";
  renderBookFilter();fillBookSel();if(doc)runSearch();
}

async function refreshDocs(){
  const docs=await api().list_documents();
  // Autorenfilter aus allen Dokumenten füllen (auch ohne vorherige Suche)
  const auth=[];for(const d of docs)auth.push(...splitAuthors(d.author));
  fillAuthorSel(auth);
  fillBookSel(docs);      // Buchfilter-Vorschläge (Titel -> id)
  const box=$("#docList");box.innerHTML="";
  box.style.display=docs.length?"":"none";
  $("#docsToolbar").style.display=docs.length?"flex":"none";
  $("#docsEmpty").style.display=docs.length?"none":"";
  $("#docsEmpty").textContent=t("noDocs");
  const ids=new Set(docs.map(d=>d.id));
  selectedForExport=new Set([...selectedForExport].filter(i=>ids.has(i)));
  for(const d of docs){
    const row=document.createElement("div");row.className="docRow";
    row.innerHTML=`
      <input type="checkbox" class="selBox" data-id="${d.id}" ${selectedForExport.has(d.id)?"checked":""}>
      <div class="docMain">
        <div class="dt">${esc(d.title)}</div>
        <div class="dm"><span>${esc(authorText(d.author))}</span>
          <span>${d.page_count||"?"} ${esc(t("pages"))}</span>
          <span>${d.passage_count} ${esc(t("passages"))}</span></div>
      </div>
      <div class="docActions">
        <button class="iconBtn" data-act="download" title="${esc(t("download"))}">${svg("download")}</button>
        <button class="iconBtn" data-act="edit" title="${esc(t("edit"))}">${svg("edit")}</button>
        <button class="iconBtn" data-act="rescan" title="${esc(t("rescan"))}">${svg("rescan")}</button>
        <button class="iconBtn danger" data-act="del" title="${esc(t("del"))}">${svg("trash")}</button>
      </div>`;
    row.addEventListener("click",e=>{
      const box=e.target.closest("[data-act],.selBox");
      if(e.target.classList.contains("selBox")){
        const id=+e.target.dataset.id;
        e.target.checked?selectedForExport.add(id):selectedForExport.delete(id);
        updateSelCount();return;
      }
      const act=box&&box.dataset&&box.dataset.act;
      // Klick auf die Reihe (kein Aktions-Button, keine Checkbox) öffnet das Buch
      if(!act){ openReader(d.id); return; }
      if(act==="del"){ if(confirm(t("confirmDelete")+d.title)) api().delete_document(d.id).then(refreshDocs); }
      else if(act==="rescan"){ api().reindex_document(d.id,false).then(r=>{if(r&&r.error)showError(r.error);refreshStatus();}); }
      else if(act==="edit"){ openEditDialog(d); }
      else if(act==="download"){ api().download_document(d.id).then(r=>{
        if(r&&r.error)showError(r.error); else if(r&&r.path)showToast(t("downloadDone")); }); }
    });
    box.appendChild(row);
  }
  updateSelCount();
  collDocs=docs;     // dieselben Daten für die Sammlungs-Index-Seiten nutzen
}
function updateSelCount(){
  const n=selectedForExport.size;
  const act=$("#selActions");if(act)act.style.display=n?"inline-flex":"none";
  const c=$("#selCount");if(c)c.textContent=n?`${n} ${t("selectedN")}`:"";
  const b=$("#exportSelBtn");if(b)b.textContent=`${t("exportSel")} (${n})`;
  const d=$("#delSelBtn");if(d)d.textContent=`${t("deleteSel")} (${n})`;
}

/* ---------- Sammlungen: Index-Seiten (Autoren/Kategorien) ---------- */
let collDocs=[];              // Cache aller Dokumente (Datenquelle)
let indexKind="author";      // aktueller Index (author|category)
let indexEntries=[];         // [{name,count}] der aktuellen Index-Seite

async function refreshCollectionData(){
  try{ collDocs=await api().list_documents(); }catch(e){}
}
// Namen + Buchanzahl je nach Art bestimmen
async function loadIndexEntries(kind){
  if(!collDocs.length) await refreshCollectionData();
  if(kind==="author"){
    // Serverliste (mit Zählern, auch leere Autoren) – wie Kategorien
    let auth=[];
    try{ auth=await api().list_authors(); }catch(e){}
    return auth.map(a=>({name:a.name,count:a.count||0}))
      .sort((a,b)=>a.name.localeCompare(b.name,"ar"));
  }
  let cats=[];
  try{ cats=await api().list_categories(); }catch(e){}
  return cats.map(c=>({name:c.name,count:c.count||0}));
}
function renderIndexList(filter){
  const box=$("#indexList");if(!box)return;
  const q=(filter||"").trim().toLowerCase();
  const list=indexEntries.filter(e=>!q||e.name.toLowerCase().includes(q));
  box.innerHTML="";
  $("#indexEmpty").style.display=list.length?"none":"";
  $("#indexEmpty").textContent = indexEntries.length
    ? t("indexNoMatch")
    : (indexKind==="author"?t("collNoAuthors"):t("collNoCats"));
  box.style.display=list.length?"":"none";
  for(const e of list){
    const b=document.createElement("button");b.className="indexItem";
    b.setAttribute("dir","auto");
    b.innerHTML=`<span class="in">${esc(e.name)}</span>`
      +`<span class="ic-count">${t("catBooksN")(e.count)}</span>`
      +`<span class="chev">${svg("next")}</span>`;
    b.onclick=()=>openCollection(indexKind,e.name);
    box.appendChild(b);
  }
}
async function openIndex(kind){
  indexKind=kind;
  await refreshCollectionData();
  $("#indexTitle").textContent = kind==="author"?t("collByAuthors"):t("collByCategories");
  $("#indexSearch").placeholder = kind==="author"?t("indexSearchAuthors"):t("indexSearchCats");
  $("#indexSearch").value="";
  $("#indexManageBtn").textContent = kind==="author"?t("manageAuthors"):t("manageCategories");
  indexEntries=await loadIndexEntries(kind);
  renderIndexList("");
  setView("index");
  $("#indexSearch").focus();
}
$("#indexSearch").addEventListener("input",e=>renderIndexList(e.target.value));
$("#indexManageBtn").onclick=()=>openManage(indexKind);
$("#navAuthorsBtn").onclick=()=>openIndex("author");
$("#navCatsBtn").onclick=()=>openIndex("category");

/* ---------- Buchliste einer Sammlung ---------- */
function openCollection(kind,name){
  indexKind=kind;      // Zurück-Button führt zur passenden Index-Seite
  const books=collDocs.filter(d=> kind==="author"
    ? splitAuthors(d.author).includes(name)
    : (d.categories||[]).includes(name));
  $("#collKind").textContent = kind==="author"?t("collKindAuthor"):t("collKindCategory");
  $("#collName").textContent = name;
  $("#collBackLabel").textContent = kind==="author"?t("collByAuthors"):t("collByCategories");
  const box=$("#collList");box.innerHTML="";
  $("#collEmpty").style.display=books.length?"none":"";
  $("#collEmpty").textContent=t("collEmpty");
  box.style.display=books.length?"":"none";
  for(const d of books){
    const row=document.createElement("div");row.className="docRow";
    row.style.cursor="pointer";
    row.innerHTML=`
      <div class="docMain">
        <div class="dt">${esc(d.title)}</div>
        <div class="dm"><span>${esc(authorText(d.author))}</span>
          <span>${d.page_count||"?"} ${esc(t("pages"))}</span>
          ${(d.categories||[]).map(c=>`<span>${esc(c)}</span>`).join("")}</div>
      </div>`;
    row.addEventListener("click",()=>openReader(d.id));
    box.appendChild(row);
  }
  setView("collection");
}
$("#collBack").onclick=()=>openIndex(indexKind);

let editState={id:null,authors:[],categories:[],origTitle:""};
function renderAuthorChips(){
  const box=$("#authorChips"),inp=$("#authorChipInput");
  box.querySelectorAll(".chip").forEach(c=>c.remove());
  editState.authors.forEach((a,i)=>{
    const c=document.createElement("span");c.className="chip";
    c.innerHTML=`<span>${esc(a)}</span><button type="button">${svg("x")}</button>`;
    c.querySelector("button").onclick=()=>{editState.authors.splice(i,1);renderAuthorChips();};
    box.insertBefore(c,inp);
  });
}
function addAuthorFromInput(val){
  const inp=$("#authorChipInput");
  const v=((val!=null?val:(inp?inp.value:""))||"").trim();
  if(v&&!editState.authors.includes(v))editState.authors.push(v);
  if(inp)inp.value="";
  renderAuthorChips();
}
function renderEditCatChips(){
  const box=$("#categoryChips"),inp=$("#catChipInput");
  box.querySelectorAll(".chip").forEach(c=>c.remove());
  editState.categories.forEach((a,i)=>{
    const c=document.createElement("span");c.className="chip";
    c.innerHTML=`<span>${esc(a)}</span><button type="button">${svg("x")}</button>`;
    c.querySelector("button").onclick=()=>{editState.categories.splice(i,1);renderEditCatChips();};
    box.insertBefore(c,inp);
  });
}
function addEditCatFromInput(val){
  const inp=$("#catChipInput");
  const v=((val!=null?val:(inp?inp.value:""))||"").trim();
  if(v&&!editState.categories.includes(v))editState.categories.push(v);
  if(inp)inp.value="";
  renderEditCatChips();
}
async function openEditDialog(d){
  editState={id:d.id,authors:splitAuthors(d.author),
             categories:(d.categories||[]).slice(),origTitle:d.title||""};
  // Vorschlagslisten (auch leere Autoren/Kategorien) für die Dropdowns laden
  await refreshAuthorSources();
  $("#editHead").textContent=t("editTitle");
  $("#fldTitleLabel").textContent=t("fldTitle");
  $("#fldAuthorsLabel").textContent=t("fldAuthors");
  $("#fldCategoriesLabel").textContent=t("fldCategories");
  $("#editCancel").textContent=t("cancel");
  $("#editSave").textContent=t("save");
  $("#editTitle").value=d.title||"";
  // Autoren-Chipfeld mit hochwertigem Auswahl-Dropdown (wie Kategorien)
  const box=$("#authorChips");box.innerHTML="";
  const inp=document.createElement("input");inp.id="authorChipInput";
  inp.placeholder=t("authorAdd");inp.setAttribute("dir","auto");
  box.appendChild(inp);
  attachCombo(inp,
    ()=>authorOptions.filter(a=>!editState.authors.includes(a)),
    v=>addAuthorFromInput(v),
    {onBackspace:()=>{ if(editState.authors.length){editState.authors.pop();renderAuthorChips();} }});
  box.onclick=e=>{if(e.target===box)inp.focus();};
  renderAuthorChips();
  // Kategorien-Chipfeld mit hochwertigem Auswahl-Dropdown
  const cbox=$("#categoryChips");cbox.innerHTML="";
  const cinp=document.createElement("input");cinp.id="catChipInput";
  cinp.placeholder=t("categoryAdd");cinp.setAttribute("dir","auto");
  cbox.appendChild(cinp);
  attachCombo(cinp,
    ()=>catOptions.filter(c=>!editState.categories.includes(c)),
    v=>addEditCatFromInput(v),
    {onBackspace:()=>{ if(editState.categories.length){editState.categories.pop();renderEditCatChips();} }});
  cbox.onclick=e=>{if(e.target===cbox)cinp.focus();};
  renderEditCatChips();
  $("#editOverlay").classList.add("show");
  $("#editTitle").focus();
}
function closeEditDialog(){$("#editOverlay").classList.remove("show");}
function saveEditDialog(){
  addAuthorFromInput();addEditCatFromInput();
  const title=$("#editTitle").value.trim()||editState.origTitle;
  const id=editState.id, cats=editState.categories.slice();
  const auths=editState.authors.slice();
  api().update_document(id,title,auths).then(async r=>{
    if(r&&r.error){showError(r.error);return;}
    try{ await api().set_document_authors(id,auths); }catch(e){}
    try{ await api().set_document_categories(id,cats); }catch(e){}
    closeEditDialog();refreshDocs();refreshCategorySources();refreshAuthorSources();
  });
}
// Enter im Titelfeld speichert (statt unbehandelt zu bleiben -> Fehlton)
$("#editTitle").addEventListener("keydown",e=>{
  if(e.key==="Enter"){e.preventDefault();saveEditDialog();}

/* ---------- Such-Panel (überall gleich: Felder statt Syntax) ---------- */
// cfg: { groupsBox, excludeArea, excludeGroup, excludeInput, state, onSearch }
function renderPanel(cfg){
  const box=$(cfg.groupsBox);if(!box)return;box.innerHTML="";
  const st=cfg.state;
  st.groups.forEach((terms,gi)=>{
    if(gi>0){const s=document.createElement("div");s.className="orSep";s.textContent=t("orSep");box.appendChild(s);}
    const g=document.createElement("div");g.className="termGroup";
    terms.forEach((term,ti)=>{
      const chip=document.createElement("span");chip.className="tchip";
      chip.innerHTML=`<span>${esc(term)}</span>`;
      const del=document.createElement("button");del.innerHTML=svg("x");
      del.onclick=(e)=>{e.stopPropagation();st.groups[gi].splice(ti,1);
        if(!st.groups[gi].length&&st.groups.length>1)st.groups.splice(gi,1);renderPanel(cfg);};
      chip.appendChild(del);g.appendChild(chip);
    });
    const inp=document.createElement("input");
    inp.placeholder=gi===0&&!terms.length?t("termFirst"):t("termMore");
    inp.onkeydown=e=>{
      if(e.key==="Enter"){
        e.preventDefault();          // sonst quittiert macOS mit Fehlton
        if(inp.value.trim()){st.groups[gi].push(inp.value.trim());renderPanel(cfg);
          $(cfg.groupsBox).querySelectorAll(".termGroup input")[gi].focus();}
        else cfg.onSearch();
      } else if(e.key==="Backspace"&&!inp.value&&terms.length){
        e.preventDefault();
        st.groups[gi].pop();renderPanel(cfg);
        $(cfg.groupsBox).querySelectorAll(".termGroup input")[gi].focus();
      }
    };
    inp.onfocus=()=>g.classList.add("focused");inp.onblur=()=>g.classList.remove("focused");
    g.appendChild(inp);g.onclick=()=>inp.focus();box.appendChild(g);
  });
  renderPanelExclude(cfg);
}
function renderPanelExclude(cfg){
  const g=$(cfg.excludeGroup);if(!g)return;
  g.querySelectorAll(".tchip").forEach(c=>c.remove());
  const inp=$(cfg.excludeInput);
  cfg.state.excludes.forEach((term,ti)=>{
    const chip=document.createElement("span");chip.className="tchip neg";
    chip.innerHTML=`<span>${esc(term)}</span>`;
    const del=document.createElement("button");del.innerHTML=svg("x");
    del.onclick=(e)=>{e.stopPropagation();cfg.state.excludes.splice(ti,1);renderPanelExclude(cfg);};
    chip.appendChild(del);g.insertBefore(chip,inp);
  });
}
// Offene Eingaben in den State übernehmen, dann Suchanfrage bauen
function collectPanel(cfg){
  const ei=$(cfg.excludeInput);
  if(ei&&ei.value.trim()){cfg.state.excludes.push(ei.value.trim());ei.value="";}
  $(cfg.groupsBox).querySelectorAll(".termGroup input").forEach((el,gi)=>{
    if(el.value.trim()){cfg.state.groups[gi].push(el.value.trim());el.value="";}
  });
  renderPanel(cfg);
  return { groups: cfg.state.groups.filter(g=>g.length),
           excludes: cfg.state.excludes.slice() };
}
function panelAddGroup(cfg){
  const st=cfg.state;
  if(st.groups[st.groups.length-1].length===0)return;
  st.groups.push([]);renderPanel(cfg);
  const inp=$(cfg.groupsBox).querySelectorAll(".termGroup input");
  inp[inp.length-1].focus();
}
function panelToggleExclude(cfg){
  const a=$(cfg.excludeArea);
  a.style.display=a.style.display==="none"?"":"none";
  cfg.state.excludeOpen=a.style.display!=="none";
  if(cfg.state.excludeOpen)$(cfg.excludeInput).focus();
}
function wireExcludeInput(cfg){
  const inp=$(cfg.excludeInput);
  inp.addEventListener("keydown",e=>{
    if(e.key==="Enter"){
      e.preventDefault();            // sonst quittiert macOS mit Fehlton
      if(inp.value.trim()){cfg.state.excludes.push(inp.value.trim());inp.value="";renderPanelExclude(cfg);}
      else cfg.onSearch();
    } else if(e.key==="Backspace"&&!inp.value&&cfg.state.excludes.length){
      e.preventDefault();
      cfg.state.excludes.pop();renderPanelExclude(cfg);
    }
  });
}

// Begriffe der zuletzt AUSGEFÜHRTEN Suche – zuverlässiger als der Zustand
// zum Klickzeitpunkt (wird in runSearch gesetzt).
let lastSearchTerms=[];
// Komplette zuletzt ausgeführte Suchanfrage (Gruppen UND Ausschlüsse).
// Wichtig: Eine Suche kann auch nur aus Ausschlüssen bestehen – dann gibt es
// keine Begriffe, die Trefferliste im Leser muss trotzdem gefüllt werden.
let lastSearchQuery={groups:[],excludes:[]};
function currentTerms(){ return lastSearchTerms.slice(); }
// Übergabe vereinheitlichen: Array (nur Begriffe) oder {groups,excludes}
function normQuery(q){
  if(!q)return {groups:[],excludes:[]};
  if(Array.isArray(q))return {groups:q.length?[q.slice()]:[],excludes:[]};
  return {groups:(q.groups||[]).map(g=>g.slice()),excludes:(q.excludes||[]).slice()};
}

// Generationszähler für Reader-Navigation: jeder Sprung (Klick/Taste) erhöht

// Verschränken bei schnellen Klicks).
let rNavGen=0;
// Prune-Zentrum während eines Sprungs: pruneFar behält [Zentrum±KEEP]. Beim
// Sprung ist das die Zielseite (sonst würde die frisch geladene Umgebung sofort

let rCenter=null;
// Laufende Seiten-Anfragen (Promises). Vor einem Treffer-Sprung muss das
// Zielfenster wirklich GERENDERT sein – auch Seiten, die eine noch laufende
// frühere Anfrage nur beansprucht (rLoaded), aber noch nicht gefüllt hat.
// Sonst wächst eine Seite oberhalb des Ziels NACH dem Scroll und schiebt es weg.
let rInflight=new Set();
// Puffer: so viele Seiten werden im Voraus geladen, damit beim Weiterlesen
// nie gewartet werden muss. KEEP muss größer sein als der Puffer.
const BEHIND=3, AHEAD=10, KEEP=30;
function escRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");}
function passageRe(p){const parts=p.trim().split(/\s+/).map(escRe);if(!parts.length)return null;try{return new RegExp(parts.join("\\s+"));}catch(e){return null;}}
const sheetOf=p=>document.getElementById("pg"+p);

async function openReader(docId,passageId,words,terms){
  rRemote=false;rBook=null;setReaderRemoteUI(false);
  rDoc=docId;rWords=words||[];rImg=false;rPassageText="";rReady=false;
  rLoaded=new Set();rHits=[];rHitIdx=-1;
  // Vollständige Suchanfrage übernehmen (Gruppen + Ausschlüsse). Fehlen
  // Begriffe, dienen ersatzweise die gefundenen Wortformen.
  const q=normQuery(terms);
  if(!q.groups.length && words && words.length) q.groups=[words.slice()];
  readerState.groups=q.groups.length?q.groups:[[]];
  readerState.excludes=q.excludes;
  readerState.excludeOpen=q.excludes.length>0;
  $("#rExcludeArea").style.display=q.excludes.length?"":"none";
  renderPanel(READER);
  // Auch ohne Begriffe suchen, wenn aus einem Treffer geöffnet – dann
  // listet der Leser die Stellen dieses Buches (wie in der Hauptsuche).
  const doSearch=!!(q.groups.length||q.excludes.length||passageId);
  $("#rHitNav").style.display="none";
  $("#reader").classList.add("open");
  const meta=await api().document(docId);
  rTitleTxt=meta.title||"";
  $("#rTitle").textContent=rTitleTxt;
  $("#rAuthor").textContent=meta.author?authorText(meta.author):"";
  rHasImg=false;
  const info=await api().pages(docId,1,1);
  rFirst=info.first_page||1;rLast=info.last_page||1;
  buildSheets();
  applyFont(rFont);
  updateTashkilBtn();
  // Startseite: Treffer > gemerkte Leseposition > erste Seite
  let start=rFirst;
  if(passageId){
    try{const p=await api().passage(passageId);
      if(!p.error){rPassageText=p.text||"";start=p.page_from||start;}}catch(e){}
  }else{
    try{const m=await api().meta_get("pos:"+docId);const n=parseInt(m.value||"",10);
      if(n>=rFirst&&n<=rLast)start=n;}catch(e){}
  }
  showReaderHint();
  // Trefferliste zuerst füllen – unabhängig davon, ob das Blättern klappt
  if(doSearch){ try{ await runReaderSearch(false,true); }catch(e){} }
  // Zur angeklickten Fundstelle springen (nicht zum ersten Treffer)
  let jumped=false;
  if(passageId&&rHits.length){
    const i=rHits.findIndex(h=>h.passage_id===passageId);
    if(i>=0){ try{ await selectHit(i); jumped=true; }catch(e){} }
  }
  if(!jumped){ try{ await gotoPage(start,false); }catch(e){} }
  rReady=true;
  updateBookmarkBtn();
}
function closeReader(){$("#reader").classList.remove("open");hideCite();}

// Blendet leserinterne Steuerelemente aus, die es im Remote-Modus (noch) nicht
// gibt: Lesezeichen und die Originalseiten-Ansicht (Shamela liefert nur Text).
function setReaderRemoteUI(remote){
  const bm=$("#rBookmark"); if(bm)bm.style.display=remote?"none":"";
  const img=$("#rImgToggle"); if(img)img.style.display=remote?"none":"";
}

// Leser für ein Online-Buch der Shamela öffnen. hit trägt book_id + seq.
async function openShamelaReader(hit){
  rRemote=true;rBook=hit.book_id;rDoc="shx:"+hit.book_id;
  rImg=false;rHasImg=false;rPassageText="";rReady=false;
  rLoaded=new Set();rHits=[];rHitIdx=-1;rPageLabels={};
  setReaderRemoteUI(true);
  const q=hit._query||"";
  rWords=shamelaTerms(q);
  readerState.groups=q?[shamelaTerms(q)]:[[]];
  readerState.excludes=[];readerState.excludeOpen=false;
  $("#rExcludeArea").style.display="none";
  renderPanel(READER);
  $("#rHitNav").style.display="none";
  $("#reader").classList.add("open");
  $("#rTitle").innerHTML=esc(hit.title||"")+`<span class="onlineBadge">${esc(t("onlineTag"))}</span>`;
  rTitleTxt=hit.title||"";
  $("#rAuthor").textContent=hit.author||"";
  // Erste Seite laden, um die Grenzen (first_seq/last_seq) des Buches zu erhalten.
  const info=await api().shamela_page(hit.book_id,hit.seq,0,0);
  if(info&&info.error){ showError(info.error); closeReader(); return; }
  rFirst=info.first_seq||hit.seq;rLast=info.last_seq||hit.seq;
  buildSheets();
  applyFont(rFont);
  updateTashkilBtn();
  showReaderHint();
  try{ await gotoPage(hit.seq,false); }catch(e){}
  // Verwandte Stellen dieses Buches auflisten (Treffer-Navigation), ohne von
  // der aufgeschlagenen Seite wegzuspringen.
  if(q){ try{ await runReaderSearch(false,true); }catch(e){} }
  rReady=true;
}

function buildSheets(){
  const box=$("#rReading");box.innerHTML="";
  const frag=document.createDocumentFragment();
  for(let p=rFirst;p<=rLast;p++){
    const s=document.createElement("div");
    s.className="pageSheet loading";s.id="pg"+p;s.dataset.page=p;
    // Lokal: Seitenzahl steht fest. Remote: Label kommt erst mit dem Seiteninhalt.
    const lbl=rRemote?(rPageLabels[p]||"…"):`${esc(t("pagePrefix"))} ${p}`;
    s.innerHTML=`<div class="pageNum">${lbl}</div>`
      +`<div class="pageText" dir="auto">…</div>`;
    frag.appendChild(s);
  }
  box.appendChild(frag);
  $("#rPageTotal").textContent=rRemote?`/ ${rLast-rFirst+1}`:`/ ${rLast}`;
}

// Seitenlabel eines Blatts nachträglich setzen (Remote: nach dem Laden bekannt)
function setSheetLabel(seq,label){
  const s=sheetOf(seq);if(!s)return;
  const n=s.querySelector(".pageNum");if(n)n.textContent=label||"…";
}
// Lesbare Seitenangabe für eine Shamela-Seite: „ج2 ص45" bzw. „ص45".
function shamelaPageLabel(pg){
  const num=(pg.page_num!=null&&pg.page_num!=="")?pg.page_num:pg.page_str;
  if(num==null||num==="")return "…";
  const part=(pg.part!=null&&String(pg.part).trim()!=="")?String(pg.part).trim():"";
  return part?`ج${part} ص${num}`:`ص${num}`;
}

// Aktive Include-Begriffe des Lesers (für wurzelbewusste Server-Markierung)
function readerTerms(){return (readerState.groups||[]).flat().filter(Boolean);}

// Fallback: geerntete Wortformen literal im Text finden (nur ohne Server-Spans)
function wordSpans(text,words){
  const out=[];
  for(const w of (words||[])){
    if(!w)continue;
    let from=0,idx;
    while((idx=text.indexOf(w,from))>=0){out.push([idx,idx+w.length]);from=idx+w.length;}
  }
  return out;
}

// Setzt Seitentext + Markierungen (Zeichen-Offsets) + optionalen Passagenkasten
// in EINEM Durchlauf zusammen. Markierungen liegen wortweise und stets ganz
// innerhalb oder ganz außerhalb der Passagenregion → korrekte Verschachtelung.
// Arabische Vokalzeichen (Tashkil) + Tatweel – spiegelt _TASHKIL aus
// engine/echo_engine/normalize.py. Wird beim Anzeigen (nicht beim Suchen) genutzt.
const TASHKIL=/[\u0610-\u061A\u064B-\u065F\u0670\u06D6-\u06ED\u0640]/g;
function stripTashkil(s){return (s||"").replace(TASHKIL,"");}
// Anzeige-Filter: blendet Vokalzeichen aus, wenn der globale Schalter aktiv ist.
const disp=s=>rHideTashkil?stripTashkil(s):s;

function stitchMarks(text,spans,boxStart,boxEnd){
  let marks=(spans||[]).filter(s=>s&&s[1]>s[0]).sort((a,b)=>a[0]-b[0]);
  const merged=[];
  for(const s of marks){const last=merged[merged.length-1];
    if(last&&s[0]<=last[1])last[1]=Math.max(last[1],s[1]);else merged.push([s[0],s[1]]);}
  const ev=[];
  for(const [a,b] of merged){ev.push({pos:a,rank:4,str:"<mark>"});ev.push({pos:b,rank:1,str:"</mark>"});}
  if(boxStart!=null&&boxEnd!=null&&boxEnd>boxStart){
    ev.push({pos:boxStart,rank:3,str:'<span class="passageBox">'});
    ev.push({pos:boxEnd,rank:2,str:"</span>"});
  }
  // gleiche Position: erst schließen (mark<box), dann öffnen (box<mark)
  ev.sort((a,b)=>a.pos-b.pos||a.rank-b.rank);
  // Wichtig: an den ORIGINAL-Positionen schneiden, Vokalzeichen erst INNERHALB
  // der Stücke entfernen (disp) – so verrutscht keine Markierung.
  let out="",cur=0;
  for(const e of ev){if(e.pos>cur){out+=esc(disp(text.slice(cur,e.pos)));cur=e.pos;}out+=e.str;}
  out+=esc(disp(text.slice(cur)));
  return out;
}

// Seiteninhalt rendern (Text oder Originalbild), inkl. Hervorhebung.
// spans = wurzelbewusst serverseitig gegen DIESEN Seitentext berechnet.
function fillSheet(pageNo,text,spans){
  const s=sheetOf(pageNo);if(!s)return;
  const body=s.querySelector(".pageText");
  if(rImg&&rHasImg){
    body.innerHTML=`<img loading="lazy" src="/api/page_image?doc=${rDoc}&page=${pageNo}" alt="">`;
  }else{
    text=text||"";
    const re=rPassageText?passageRe(rPassageText):null;
    const m=re?re.exec(text):null;
    let marks=(spans&&spans.length)?spans:(rWords.length?wordSpans(text,rWords):[]);
    body.innerHTML=stitchMarks(text,marks,m?m.index:null,m?m.index+m[0].length:null)||"—";
  }
  s.style.minHeight="";   // reservierte Platzhalterhöhe freigeben (echte Höhe)
  s.classList.remove("loading");
}

async function ensurePages(from,to){
  from=Math.max(rFirst,from);to=Math.min(rLast,to);
  const need=[];for(let p=from;p<=to;p++)if(!rLoaded.has(p))need.push(p);
  if(!need.length)return;
  const a=need[0],b=need[need.length-1];
  need.forEach(p=>rLoaded.add(p));      // doppelte Anfragen vermeiden
  // Remote (Shamela): Seiten per sequence_num vom Server holen. Der Server
  // liefert /page mit seq=a und after=(b-a), also den ganzen Bereich auf einmal.
  // Hervorhebung passiert clientseitig anhand der Suchbegriffe (wordSpans).
  const job=(rRemote
      ? api().shamela_page(rBook,a,0,b-a).then(res=>{
          if(res&&res.error){need.forEach(p=>rLoaded.delete(p));return;}
          for(const pg of (res.pages||[])){
            if(pg.page_label==null) pg.page_label=shamelaPageLabel(pg);
            rPageLabels[pg.seq]=pg.page_label;
            setSheetLabel(pg.seq,pg.page_label);
            fillSheet(pg.seq,pg.text,null);
          }})
      : api().pages(rDoc,a,b,readerTerms())
          .then(res=>{for(const pg of (res.pages||[]))fillSheet(pg.page_no,pg.text,pg.spans);}))
    .catch(()=>{need.forEach(p=>rLoaded.delete(p));});
  rInflight.add(job);
  try{ await job; } finally{ rInflight.delete(job); pruneFar(); }
}
// Prüft, ob im Fenster noch eine Seite ungefüllt ("…") ist.
function windowHasLoading(from,to){
  for(let p=from;p<=to;p++){const s=sheetOf(p);
    if(s&&s.classList.contains("loading"))return true;}
  return false;
}
// Lädt das Fenster und wartet, bis es WIRKLICH gerendert ist – inkl. Seiten,
// die eine andere, noch laufende Anfrage beansprucht hat. Ohne das kann eine
// Seite oberhalb des Ziels nach dem Scroll nachwachsen (zweimal-klicken-Bug).
async function ensureWindowFilled(from,to,gen){
  from=Math.max(rFirst,from);to=Math.min(rLast,to);
  await ensurePages(from,to);
  if(gen!==rNavGen)return;
  let guard=0;
  while(guard++<4 && windowHasLoading(from,to) && rInflight.size){
    await Promise.all([...rInflight]);
    if(gen!==rNavGen)return;
    await ensurePages(from,to);   // durch Fehler Freigewordenes nachladen
    if(gen!==rNavGen)return;
  }
}
// Weit entfernte Seiten wieder leeren, damit dicke Bücher flüssig bleiben
function pruneFar(){
  const center=(rCenter!=null?rCenter:rPage);
  for(const p of [...rLoaded]){
    if(Math.abs(p-center)>KEEP){
      const s=sheetOf(p);
      if(s){
        // Aktuelle Höhe einfrieren, damit das Leeren die Dokumenthöhe – und
        // damit die Scrollposition – nicht verändert.
        s.style.minHeight=s.offsetHeight+"px";
        s.querySelector(".pageText").innerHTML="…";s.classList.add("loading");
      }
      rLoaded.delete(p);
    }
  }
}

// Puffer im Hintergrund füllen (ohne zu blockieren)
function prefetch(around){ ensurePages(around-BEHIND, around+AHEAD); }

// Findet ab Seite `from` vorwärts (über die Passagenspanne) die erste Marke –
// bevorzugt den Passagenkasten, sonst ein hervorgehobenes Wort. So landet man
// auch dann auf dem Treffer, wenn er erst auf page_to (der Folgeseite) steht.
function firstHitTarget(from,to){
  for(let p=from;p<=to;p++){
    const s=sheetOf(p);if(!s)continue;
    const el=s.querySelector(".passageBox")||s.querySelector("mark");
    if(el)return {el,page:p};
  }
  return null;
}

async function gotoPage(n,smooth=true,hit=false,gen,toPage){
  if(gen==null)gen=++rNavGen;          // eigenständiger Nav-Einstieg = neueste Nav
  n=Math.min(rLast,Math.max(rFirst,n|0));
  // Prune um die Zielseite zentrieren, damit die frisch geladene Umgebung nicht
  // sofort wieder geleert wird (sonst Sprung auf ein leeres Sheet).
  rCenter=n;
  try{
    // Ganzes Puffer-Fenster VOR dem Scrollen laden UND auf das tatsächliche
    // Rendern warten, damit sich das Layout oberhalb des Ziels danach nicht
    // mehr verschiebt.
    await ensureWindowFilled(n-BEHIND,n+AHEAD,gen);
  }finally{ rCenter=null; }
  if(gen!==rNavGen)return;              // ein neuerer Sprung hat übernommen
  let scrollPage=n,target=sheetOf(n),block="start";
  if(hit){
    // Nur innerhalb der Passagenspanne suchen (nicht auf Rest-Markierungen
    // späterer Seiten aus einem früheren Treffer springen).
    const end=Math.min(rLast,Math.max(n,toPage||n));
    const found=firstHitTarget(n,end);
    if(found){target=found.el;scrollPage=found.page;block="center";}
  }
  if(target){
    // Treffer-Sprünge sofort (deterministisch); reines Blättern darf smooth sein.
    target.scrollIntoView({block,behavior:(hit?"auto":(smooth?"smooth":"auto"))});
  }
  setCurrentPage(scrollPage);
}
function setCurrentPage(n){
  if(n===rPage&&$("#rPageInput").value)return;
  rPage=n;
  const inp=$("#rPageInput");
  // Remote: das Eingabefeld zeigt die fortlaufende Position (1..N), nicht die
  // interne sequence_num – passend zur Gesamtzahl „/ N".
  if(document.activeElement!==inp)inp.value=rRemote?(n-rFirst+1):n;
  const span=rLast-rFirst||1;
  $("#rProgressBar").style.width=(((n-rFirst)/span)*100).toFixed(1)+"%";
  $$("#rReading .pageSheet.current").forEach(x=>x.classList.remove("current"));
  const s=sheetOf(n);if(s)s.classList.add("current");
  saveReadPos(n);
  if(typeof updateBookmarkBtn==="function")updateBookmarkBtn();
}
let _posT=null;
function saveReadPos(n){
  if(!rReady||!rDoc)return;
  clearTimeout(_posT);
  _posT=setTimeout(()=>{try{api().meta_set("pos:"+rDoc,String(n));}catch(e){}},900);
}

// Sichtbare Seite ermitteln + nachladen
let _scrollT=null;
$("#rReading").addEventListener("scroll",()=>{
  clearTimeout(_scrollT);
  _scrollT=setTimeout(()=>{
    const box=$("#rReading");const top=box.getBoundingClientRect().top+60;
    let cur=rPage;
    for(const s of box.querySelectorAll(".pageSheet")){
      const r=s.getBoundingClientRect();
      if(r.bottom>top){cur=+s.dataset.page;break;}
    }
    setCurrentPage(cur);
    prefetch(cur);
  },90);
},{passive:true});

function showReaderHint(){
  $("#rResults").innerHTML=`<div class="empty" style="padding:40px 16px">`
    +svg("search")+`<div>${esc(t("readerSearchPrompt"))}</div></div>`;
}

async function runReaderSearch(autoSelect=true,force=false){
  const { groups, excludes } = collectPanel(READER);
  // Ohne Begriffe normalerweise nur der Hinweis – beim Öffnen aus einem
  // Treffer (force) wird trotzdem gelistet, was in diesem Buch steht.
  if(!groups.length && !excludes.length && !force){
    showReaderHint();rHits=[];updateHitNav();return; }
  let res;
  if(rRemote){
    const q=groups.flat().filter(Boolean).join(" ").trim();
    if(!q){ showReaderHint();rHits=[];updateHitNav();return; }
    const r=await api().shamela_search({q,limit:100,book_ids:[rBook]});
    if(r&&r.error){ showError(r.error); rHits=[];updateHitNav(); return; }
    res={hits:(r.hits||[]).map(h=>shamelaToReaderHit(h,q))};
  }else{
    res=await api().search_terms(groups, excludes, null, rDoc, 0, 200);
  }
  rHits=res.hits||[];rHitIdx=-1;
  renderReaderHits(res);
  updateHitNav();
  if(autoSelect&&rHits.length)selectHit(0);
}
// Shamela-Treffer in das Trefferformat des Lesers übersetzen: die
// sequence_num wird zur „Seite" (page_from=page_to=seq), die Suchbegriffe
// dienen als Wortformen für die Hervorhebung.
function shamelaToReaderHit(h,q){
  return {title:h.title,author:h.author,snippet:h.snippet||"",
    matched_words:shamelaTerms(q),page_from:h.seq,page_to:h.seq,
    page_label:shamelaHitLabel(h),passage_id:null,
    book_id:h.book_id,seq:h.seq,reliability:"exact"};
}
// Zerlegt die Freitext-Anfrage grob in Wörter für die literale Hervorhebung.
function shamelaTerms(q){return (q||"").split(/\s+/).map(s=>s.trim()).filter(w=>w.length>1);}
function shamelaHitLabel(h){
  const num=(h.page_num!=null&&h.page_num!=="")?h.page_num:h.page;
  if(num==null||num==="")return null;
  const part=(h.part!=null&&String(h.part).trim()!=="")?String(h.part).trim():"";
  return part?`ج${part} ص${num}`:`ص${num}`;
}
function updateHitNav(){
  const nav=$("#rHitNav");
  nav.style.display=rHits.length?"inline-flex":"none";
  $("#rHitCount").textContent=rHits.length?`${rHitIdx+1} / ${rHits.length}`:"";
}
async function selectHit(i){
  if(!rHits.length)return;
  const gen=++rNavGen;                   // dieser Klick ist jetzt der neueste
  rHitIdx=(i+rHits.length)%rHits.length;
  const h=rHits[rHitIdx];
  $$("#rResults .rHit").forEach((x,n)=>x.classList.toggle("active",n===rHitIdx));
  const act=$$("#rResults .rHit")[rHitIdx];
  if(act)act.scrollIntoView({block:"nearest"});
  rWords=h.matched_words||[];rPassageText="";
  if(h.passage_id){const p=await api().passage(h.passage_id);if(!p.error)rPassageText=p.text||"";}
  if(gen!==rNavGen)return;                // ein neuerer Klick hat übernommen
  // Ganze Passagenspanne neu rendern lassen (die Flexion kann auf page_to
  // liegen), damit dort tatsächlich markiert wird.
  const pt=h.page_to||h.page_from;
  for(let p=h.page_from;p<=pt;p++)rLoaded.delete(p);
  await gotoPage(h.page_from,false,true,gen,pt);
  updateHitNav();
}
function renderReaderHits(res){
  const box=$("#rResults");box.innerHTML="";
  if(!res.hits.length){box.innerHTML=`<div class="empty" style="padding:30px 12px">${esc(t("empty"))}</div>`;return;}
  res.hits.forEach((h,i)=>{
    const el=document.createElement("div");el.className="rHit";
    const pg=h.page_label?esc(h.page_label)
      :(h.page_from===h.page_to?`${t("pagePrefix")} ${h.page_from}`:`${t("pagePrefix")} ${h.page_from}–${h.page_to}`);
    // Remote: (noch) keine Lesezeichen – Fähnchen weglassen.
    const bmHtml=rRemote?"":`<button class="bmBtn" title="${esc(t("bmAdd"))}">${svg("bookmark")}</button>`;
    el.innerHTML=`<div class="rp"><span>${pg}</span>${bmHtml}</div>`
      +`<div class="rtext" dir="auto">${highlight(h.snippet,h.matched_words)}</div>`;
    const bm=el.querySelector(".bmBtn");
    if(bm){
      if(bmKeys.has(bmKey(rDoc,h.page_from,h.passage_id)))bm.classList.add("on");
      bm.onclick=(e)=>{
        e.stopPropagation();
        toggleBookmark(bm,{document_id:rDoc,passage_id:h.passage_id,
          page_no:h.page_from,snippet:h.snippet,
          terms:(readerState.groups||[]).flat()});
      };
    }
    el.onclick=()=>selectHit(i);
    box.appendChild(el);
  });
}

function applyFont(f){
  rFont=Math.min(1.8,Math.max(.8,f));
  $("#rReading").style.setProperty("--rfont",rFont.toFixed(2));
  try{api().meta_set("font_scale",rFont.toFixed(2));}catch(e){}
}

/* ---------- Zitat kopieren mit Quellenangabe ---------- */
function hideCite(){$("#citeBtn").style.display="none";}
function pageOfNode(node){
  let el=node&&(node.nodeType===1?node:node.parentElement);
  while(el&&!el.classList?.contains("pageSheet"))el=el.parentElement;
  return el?+el.dataset.page:rPage;
}
$("#rReading").addEventListener("mouseup",()=>{
  setTimeout(()=>{
    const sel=window.getSelection();
    const txt=sel&&sel.toString().trim();
    if(!txt){hideCite();return;}
    const rect=sel.getRangeAt(0).getBoundingClientRect();
    const b=$("#citeBtn");
    b.style.display="flex";
    b.style.left=Math.max(12,Math.min(window.innerWidth-190,rect.left+rect.width/2-90))+"px";
    b.style.top=Math.max(12,rect.top-46)+"px";
    b.dataset.page=pageOfNode(sel.anchorNode);
  },10);
});
$("#citeBtn").onclick=async()=>{
  const sel=window.getSelection();const txt=sel?sel.toString().trim():"";
  if(!txt)return hideCite();
  const pg=$("#citeBtn").dataset.page||rPage;
  // Remote: die lesbare Shamela-Seitenangabe (z. B. „ج2 ص45") zitieren.

// Notizen sicher darstellen: alles maskieren, nur Listen/Absätze bilden
function renderNotes(txt){
  const lines=String(txt||"").split(/\r?\n/);
  let html="",inList=false;
  for(const raw of lines){
    const l=raw.trim();
    if(/^[-*•]\s+/.test(l)){
      if(!inList){html+="<ul>";inList=true;}
      html+="<li>"+esc(l.replace(/^[-*•]\s+/,""))+"</li>";
    }else{
      if(inList){html+="</ul>";inList=false;}
      if(l)html+="<p>"+esc(l)+"</p>";
    }
  }
  if(inList)html+="</ul>";
  return html||`<p>${esc(t("newsNone"))}</p>`;
}
// Zweisprachige Release-Notizen: deutscher Teil, dann Marker <!--ar-->, dann
// arabischer Teil. Zeigt den Abschnitt der aktuellen App-Sprache (Fallback auf
// den jeweils anderen). Ohne Marker (ältere Releases) wird alles gezeigt.
function notesForLang(body,l){
  const txt=String(body||"");
  const parts=txt.split(/<!--\s*ar\s*-->/i);
  if(parts.length<2)return txt.trim();
  const de=parts[0].replace(/<!--\s*de\s*-->/ig,"").trim();
  const ar=parts.slice(1).join("").replace(/<!--\s*de\s*-->/ig,"").trim();
  return ((l==="ar"?ar:de)||de||ar||"").trim();
}
function openNews(version,notes){
  $("#newsHead").textContent=T[lang].newsTitle(version||"");
  $("#newsBody").innerHTML=renderNotes(notesForLang(notes,lang));
  $("#newsOk").textContent=t("newsOk");
  $("#newsOverlay").classList.add("show");
}
function closeNews(){
  $("#newsOverlay").classList.remove("show");
  try{api().whats_new_ack();}catch(e){}
}

/* Export / Import – mit sichtbarem, bleibendem Fortschrittsbalken */
function showProgress(msg){
  let el=$("#progress");
  if(!el){el=document.createElement("div");el.id="progress";
    el.style.cssText="position:fixed;bottom:18px;left:50%;transform:translateX(-50%);"+
      "background:var(--ink);color:#fff;padding:11px 20px;border-radius:10px;"+
      "font-size:14px;z-index:100;box-shadow:var(--shadow);display:flex;gap:10px;align-items:center;";
    document.body.appendChild(el);}
  el.innerHTML=`<span class="spin"></span><span>${esc(msg)}</span>`;
  el.style.display="flex";
}
function hideProgress(){const el=$("#progress");if(el)el.style.display="none";}
async function trackJob(key,doneMsg){
  showProgress(doneMsg+" …");
  const poll=async()=>{const st=await api().status();const j=st.jobs.find(x=>x.file===key);
    if(!j)return setTimeout(poll,600);
    if(j.state==="fertig"){hideProgress();showToast(j.result||doneMsg);refreshDocs();}
    else if(j.state==="fehler"){hideProgress();showError(j.error||"Fehler");}
    else{showProgress(jobLabel(j));refreshDocs();setTimeout(poll,700);}};
  poll();
}
$("#exportBtn").onclick=async()=>{const r=await api().export_library();if(r&&r.error)return showError(r.error);if(r&&r.cancelled)return;trackJob("Export",t("exportDone"));};

let _shStatus={configured:false,url:""};
async function refreshShamelaState(){
  try{ _shStatus=await api().shamela_status(); }catch(e){ _shStatus={configured:false,url:""}; }
  const el=$("#shamelaState");
  if(el){
    if(searchSource!=="shamela"){ el.textContent=""; el.className="shamelaState"; }
    else if(_shStatus.configured){ el.textContent="● "+t("shamelaConnected"); el.className="shamelaState ok"; }
    else { el.textContent="● "+t("shamelaNotSet"); el.className="shamelaState off"; }
  }
}
// Beim Wechsel in den Shamela-Modus die Filterlisten vom Server holen
async function loadShamelaFilters(){
  try{ const c=await api().shamela_categories(); if(c&&!c.error)fillCatSel(c.categories||[]); }catch(e){}
  try{ const a=await api().shamela_authors("",80); if(a&&!a.error)fillAuthorSel((a.authors||[]).slice(0,80)); }catch(e){}
}
function applySourceUI(){
  const shamela=searchSource==="shamela";
  $$("#srcToggle .srcBtn").forEach(b=>b.classList.toggle("active",b.dataset.src===searchSource));
  // Buchfilter (lokal) und Semantik-Schalter im Online-Modus verbergen
  const bookLbl=$("#bookLabel")&&$("#bookLabel").closest("label");
  if(bookLbl)bookLbl.style.display=shamela?"none":"";
  const semLbl=$("#semantic")&&$("#semantic").closest("label");
  if(semLbl)semLbl.style.display=shamela?"none":"";
  refreshShamelaState();
}
async function setSource(src){
  if(src===searchSource)return;
  searchSource=src;
  // Filter zurücksetzen (Quellen haben unterschiedliche Autoren/Kategorien)
  authorFilterSel=[];catFilterSel=[];bookFilterSel=[];
  renderAuthorFilter();renderCatFilter();renderBookFilter();
  applySourceUI();
  if(src==="shamela"){
    await refreshShamelaState();
    if(!_shStatus.configured){ openShamelaCfg(); }
    else { await loadShamelaFilters(); }
    $("#results").innerHTML=emptyBox(_shStatus.configured?t("shamelaQueryHint"):t("shamelaNeedCfg"));
    $("#count").textContent="";
  }else{
    refreshCategorySources();refreshAuthorSources();refreshDocs();
    $("#results").innerHTML=emptyBox(t("start"));
    $("#count").textContent="";
  }
}
$$("#srcToggle .srcBtn").forEach(b=>b.onclick=()=>setSource(b.dataset.src));

/* Shamela-Einstellungen (URL + Token, einmalig) */
function openShamelaCfg(){
  $("#shamelaUrl").value=_shStatus.url||"";
  $("#shamelaToken").value="";      // Token wird nie zurückgegeben
  $("#shamelaMsg").textContent="";$("#shamelaMsg").className="shamelaMsg";
  $("#shamelaClearBtn").style.display=_shStatus.configured?"":"none";
  $("#shamelaOverlay").classList.add("show");
  setTimeout(()=>$("#shamelaUrl").focus(),50);
}
function closeShamelaCfg(){$("#shamelaOverlay").classList.remove("show");}
$("#shamelaCfgBtn").onclick=async()=>{ await refreshShamelaState(); openShamelaCfg(); };

$("#shamelaSave").onclick=async()=>{
  const url=$("#shamelaUrl").value.trim();
  const token=$("#shamelaToken").value.trim();
  const msg=$("#shamelaMsg");
  msg.className="shamelaMsg";msg.textContent=t("shamelaTesting");
  const r=await api().shamela_save(url,token);
  if(r&&r.ok){
    msg.className="shamelaMsg ok";
    msg.textContent=(r.points!=null)?t("shamelaOkN")(r.points):t("shamelaOk");
    await refreshShamelaState();
    if(searchSource==="shamela"){ await loadShamelaFilters();
      $("#results").innerHTML=emptyBox(t("shamelaQueryHint")); }
    setTimeout(closeShamelaCfg,900);
  }else{
    msg.className="shamelaMsg err";
    msg.textContent=(r&&r.error)||t("shamelaLoadErr");
    await refreshShamelaState();
  }
};
$("#shamelaClearBtn").onclick=async()=>{
  await api().shamela_clear();
  _shStatus={configured:false,url:""};
  $("#shamelaMsg").className="shamelaMsg";$("#shamelaMsg").textContent=t("shamelaCleared");
  $("#shamelaClearBtn").style.display="none";
  refreshShamelaState();
};
